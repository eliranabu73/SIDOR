<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>sidor4S API</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, sans-serif; max-width: 520px; margin: 8vh auto; padding: 0 1.5rem; line-height: 1.6; color: #0f172a; }
    code { background: #f1f5f9; padding: 0.15rem 0.45rem; border-radius: 6px; font-size: 0.92em; }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .grid { display: grid; gap: 0.4rem; margin-top: 1.25rem; }
    .row { display: flex; gap: 0.75rem; align-items: baseline; }
    .method { background: #0f172a; color: #fff; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.75rem; font-family: ui-monospace, monospace; min-width: 3.5rem; text-align: center; }
  </style>
</head>
<body>
  <h1>sidor4S API</h1>
  <p>Work-scheduling SaaS backend. עיקרי הנקודות:</p>
  <div class="grid">
    <div class="row"><span class="method">GET</span><code>/health</code></div>
    <div class="row"><span class="method">POST</span><code>/v1/shifts/:shiftId/validate-assignment</code></div>
    <div class="row"><span class="method">PATCH</span><code>/v1/shifts/:shiftId/assignments</code></div>
    <div class="row"><span class="method">POST</span><code>/v1/schedules/:scheduleId/auto-schedule</code></div>
    <div class="row"><span class="method">GET</span><code>/v1/presence/:orgId</code></div>
  </div>
  <p style="margin-top: 2rem;">
    <a href="/health">/health</a>&nbsp;·&nbsp;
    <a href="https://github.com/eliranabu73/SIDOR">GitHub</a>
  </p>
</body>
</html>
